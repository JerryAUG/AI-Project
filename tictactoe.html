<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.04); }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #mode-btn {
      background: #0f3460;
      color: #a8dadc;
      border: 2px solid #a8dadc;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #aaa;
    }

    .score-item span { font-weight: bold; font-size: 1.3rem; }
    .score-item .x-score { color: #e94560; }
    .score-item .o-score { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-btn">vs CPU</button>
  </div>

  <div id="score">
    <div class="score-item">X &nbsp;<span class="x-score" id="sx">0</span></div>
    <div class="score-item">Draws &nbsp;<span id="sd">0</span></div>
    <div class="score-item">O &nbsp;<span class="o-score" id="so">0</span></div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, over, vsCPU;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const modeBtn = document.getElementById('mode-btn');

    vsCPU = false;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      setStatus(`X's turn`);
    }

    function setStatus(msg) { status.textContent = msg; }

    function checkWin(b, p) {
      return WINS.find(([a, c, d]) => b[a] === p && b[c] === p && b[d] === p) || null;
    }

    function checkDraw(b) { return b.every(c => c !== ''); }

    function highlight(combo) {
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function handleClick(i) {
      if (over || board[i]) return;
      place(i, current);
    }

    function place(i, player) {
      board[i] = player;
      cells[i].textContent = player;
      cells[i].classList.add('taken', player.toLowerCase());

      const win = checkWin(board, player);
      if (win) {
        highlight(win);
        setStatus(`${player} wins!`);
        scores[player]++;
        updateScore();
        over = true;
        return;
      }
      if (checkDraw(board)) {
        setStatus("It's a draw!");
        scores.D++;
        updateScore();
        over = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);

      if (vsCPU && current === 'O' && !over) {
        setTimeout(cpuMove, 350);
      }
    }

    // Minimax AI
    function minimax(b, isMax) {
      if (checkWin(b, 'O')) return 10;
      if (checkWin(b, 'X')) return -10;
      if (b.every(c => c)) return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = '';
          }
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = '';
          }
        });
        return best;
      }
    }

    function cpuMove() {
      let best = -Infinity, move = -1;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const score = minimax(board, false);
          board[i] = '';
          if (score > best) { best = score; move = i; }
        }
      });
      if (move !== -1) place(move, 'O');
    }

    function updateScore() {
      document.getElementById('sx').textContent = scores.X;
      document.getElementById('so').textContent = scores.O;
      document.getElementById('sd').textContent = scores.D;
    }

    cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));

    document.getElementById('restart').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      init();
    });

    init();
  </script>
</body>
</html>
