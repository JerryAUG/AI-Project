<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>史迪仔大戰殭屍</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#07071a;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; font-family:Arial,sans-serif;
  overflow:hidden; user-select:none;
}
canvas {
  display:block; cursor:crosshair;
  border:3px solid #2244aa;
  box-shadow:0 0 40px rgba(40,80,255,0.5);
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ─── SETUP ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 860;
const H = canvas.height = 620;

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r); this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r); this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r); this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r); this.closePath();
    return this;
  };
}

// ─── GUN DEFINITIONS ───────────────────────────────────────────────────────
const GUNS = [
  { id:'pistol',  name:'手槍',    icon:'🔫', dmg:25,  rate:350,  spd:9,  spread:0,    cnt:1, col:'#cccccc', piercing:false, explosive:false },
  { id:'shotgun', name:'霰彈槍',  icon:'💥', dmg:40,  rate:900,  spd:8,  spread:0.38, cnt:6, col:'#FFD700', piercing:false, explosive:false },
  { id:'smg',     name:'衝鋒槍',  icon:'⚡', dmg:12,  rate:70,   spd:12, spread:0.06, cnt:1, col:'#00FF88', piercing:false, explosive:false },
  { id:'plasma',  name:'電漿槍',  icon:'🌀', dmg:60,  rate:480,  spd:7,  spread:0,    cnt:1, col:'#00FFFF', piercing:true,  explosive:false },
  { id:'rocket',  name:'火箭炮',  icon:'🚀', dmg:130, rate:1400, spd:5,  spread:0,    cnt:1, col:'#FF4500', piercing:false, explosive:true,  expR:95 },
];

// ─── UPGRADE POOL ──────────────────────────────────────────────────────────
const STAT_UPS = [
  { id:'dmg',    label:'🔪 傷害 +25%',    desc:'所有武器傷害提升25%' },
  { id:'spd',    label:'👟 速度 +20%',    desc:'史迪仔移動更快' },
  { id:'rate',   label:'⚡ 射速 +25%',    desc:'開槍頻率大幅提升' },
  { id:'hp',     label:'❤️ 回血 +60',     desc:'立即恢復60點生命' },
  { id:'maxhp',  label:'💖 血量上限 +40', desc:'最大生命值永久增加' },
  { id:'extra',  label:'🔫 多發子彈',     desc:'每次射擊額外多一發' },
  { id:'dmg2',   label:'🗡️ 傷害 +30%',    desc:'再次提升武器傷害' },
  { id:'rate2',  label:'⚡ 射速 +30%',    desc:'再次提升射速' },
];

// ─── GAME STATE ────────────────────────────────────────────────────────────
let player, bullets, zombies, particles, explosions, levelOpts;
let totalKills = 0;
let gameState  = 'start';  // start | playing | levelup | gameover
let spawnTimer = 0;
let keys = {}, mx = W/2, my = H/2, mdown = false;
let shakeX = 0, shakeY = 0, shakeTmr = 0, shakeAmt = 0;

function initPlayer() {
  player = {
    x:W/2, y:H/2, vx:0, vy:0,
    hp:100, maxHp:100,
    speed:3.5, angle:0,
    kills:0, level:1, killsNeeded:50,
    gunIdx:0, lastFire:0, iframes:0,
    dmgMult:1, rateMult:1, spdMult:1, extraBullets:0,
  };
}

function startGame() {
  initPlayer();
  bullets=[]; zombies=[]; particles=[]; explosions=[]; levelOpts=[];
  totalKills=0; spawnTimer=0;
  gameState='playing';
}

// ─── ZOMBIE TYPES ──────────────────────────────────────────────────────────
function pickZombieType(lvl) {
  const pool = [{ name:'walker', hp:50, spd:1.1, r:18, col:'#3a7a3a', pts:1 }];
  if (lvl>=2) pool.push({ name:'runner', hp:40, spd:2.3, r:15, col:'#aa3333', pts:2 });
  if (lvl>=3) pool.push({ name:'tank',   hp:160,spd:0.7, r:26, col:'#446644', pts:3 });
  if (lvl>=4) pool.push({ name:'speeder',hp:35, spd:3.2, r:13, col:'#dd6600', pts:2 });
  if (lvl>=5) pool.push({ name:'brute',  hp:320,spd:0.9, r:32, col:'#553366', pts:5 });
  return pool[Math.floor(Math.random()*pool.length)];
}

function spawnZombie() {
  spawnTimer--;
  if (spawnTimer>0) return;
  const rate = Math.max(18, 95 - player.level*9);
  spawnTimer = rate;

  const count = player.level>=4 ? 1+Math.floor(Math.random()*2) : 1;
  for (let j=0; j<count; j++) {
    const cfg = pickZombieType(player.level);
    const side = Math.floor(Math.random()*4);
    let x,y,pad=35;
    if (side===0)      { x=Math.random()*W; y=-pad; }
    else if (side===1) { x=W+pad; y=Math.random()*H; }
    else if (side===2) { x=Math.random()*W; y=H+pad; }
    else               { x=-pad; y=Math.random()*H; }
    zombies.push({
      x,y, hp:cfg.hp+(player.level-1)*12,
      maxHp:cfg.hp+(player.level-1)*12,
      spd:cfg.spd, r:cfg.r, col:cfg.col, pts:cfg.pts,
      name:cfg.name, moveAngle:0, dead:false
    });
  }
}

// ─── FIRING ────────────────────────────────────────────────────────────────
function tryFire(now) {
  const gun = GUNS[player.gunIdx];
  const effRate = gun.rate / player.rateMult;
  if (now - player.lastFire < effRate) return;
  player.lastFire = now;

  const total   = gun.cnt + player.extraBullets;
  const effDmg  = gun.dmg * player.dmgMult;
  const base    = player.angle;
  const muzzleX = player.x + Math.cos(base)*24;
  const muzzleY = player.y + Math.sin(base)*24;

  for (let i=0; i<total; i++) {
    let ang;
    if (gun.spread>0) {
      ang = base + (Math.random()-0.5)*gun.spread*2;
    } else if (total>1) {
      ang = base + (i-(total-1)/2)*0.12;
    } else {
      ang = base;
    }
    bullets.push({
      x:muzzleX, y:muzzleY,
      vx:Math.cos(ang)*gun.spd, vy:Math.sin(ang)*gun.spd,
      r:gun.explosive?7:4, dmg:effDmg, col:gun.col,
      piercing:gun.piercing, explosive:gun.explosive, expR:gun.expR||0,
      alive:true, hits:0
    });
  }
  // muzzle flash
  for (let i=0; i<6; i++) {
    const a=base+(Math.random()-0.5)*0.9;
    particles.push({ x:muzzleX, y:muzzleY,
      vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5,
      life:0.22, maxLife:0.22, col:gun.col, r:3 });
  }
}

// ─── EXPLOSION ─────────────────────────────────────────────────────────────
function doExplosion(x,y,r,dmg) {
  explosions.push({ x,y, r, maxR:r, life:1 });
  shakeTmr=20; shakeAmt=12;
  for (const z of zombies) {
    const dx=z.x-x, dy=z.y-y, d=Math.hypot(dx,dy);
    if (d < r+z.r) {
      z.hp -= dmg*(1-d/(r+z.r));
      if (d>0) { z.x+=dx/d*10; z.y+=dy/d*10; }
    }
  }
  for (let i=0;i<24;i++) {
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:0.9, maxLife:0.9,
      col:['#FF4500','#FF8C00','#FFD700'][i%3], r:3+Math.random()*5 });
  }
}

function bloodSplat(x,y,col) {
  for (let i=0;i<10;i++) {
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*3;
    particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:0.6, maxLife:0.6, col:col||'#4a1010', r:2+Math.random()*3 });
  }
}

// ─── UPDATE ────────────────────────────────────────────────────────────────
function update(dt) {
  if (gameState!=='playing') return;

  // Player movement
  let dx=0,dy=0;
  if (keys['w']||keys['arrowup'])    dy-=1;
  if (keys['s']||keys['arrowdown'])  dy+=1;
  if (keys['a']||keys['arrowleft'])  dx-=1;
  if (keys['d']||keys['arrowright']) dx+=1;
  if (dx&&dy) { dx*=0.707; dy*=0.707; }
  const spd = player.speed*player.spdMult;
  player.x = Math.max(player.r||22, Math.min(W-(player.r||22), player.x+dx*spd));
  player.y = Math.max(player.r||22, Math.min(H-(player.r||22), player.y+dy*spd));
  player.angle = Math.atan2(my-player.y, mx-player.x);

  if (mdown||keys[' ']) tryFire(Date.now());
  if (player.iframes>0) player.iframes--;

  // Spawn & move zombies
  spawnZombie();
  for (const z of zombies) {
    const zdx=player.x-z.x, zdy=player.y-z.y;
    const zd=Math.hypot(zdx,zdy);
    if (zd>0) { z.x+=zdx/zd*z.spd; z.y+=zdy/zd*z.spd; z.moveAngle=Math.atan2(zdy,zdx); }
    if (zd < 22+z.r && player.iframes===0) {
      player.hp -= 10;
      player.iframes = 40;
      shakeTmr=10; shakeAmt=7;
      if (player.hp<=0) { player.hp=0; gameState='gameover'; return; }
    }
  }

  // Update bullets
  for (const b of bullets) {
    b.x+=b.vx; b.y+=b.vy;
    if (b.x<-30||b.x>W+30||b.y<-30||b.y>H+30) {
      if (b.explosive) doExplosion(b.x,b.y,b.expR,b.dmg);
      b.alive=false; continue;
    }
    for (const z of zombies) {
      if (!b.alive) break;
      if (Math.hypot(z.x-b.x, z.y-b.y) < b.r+z.r) {
        if (b.explosive) { doExplosion(b.x,b.y,b.expR,b.dmg); b.alive=false; }
        else {
          z.hp -= b.dmg;
          bloodSplat(z.x,z.y,z.col);
          b.hits++;
          if (!b.piercing || b.hits>=3) b.alive=false;
        }
      }
    }
  }
  bullets = bullets.filter(b=>b.alive);

  // Kill check
  for (const z of zombies) {
    if (z.hp<=0 && !z.dead) {
      z.dead=true;
      bloodSplat(z.x,z.y,z.col);
      player.kills++;
      totalKills++;
      if (player.kills>=player.killsNeeded) {
        player.kills=0; player.level++;
        buildLevelOpts();
        gameState='levelup';
      }
    }
  }
  zombies = zombies.filter(z=>!z.dead);

  // Particles
  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vx*=0.91; p.vy*=0.91; p.life-=dt; }
  particles = particles.filter(p=>p.life>0);

  for (const e of explosions) { e.life-=dt*2; }
  explosions = explosions.filter(e=>e.life>0);

  // Screen shake
  if (shakeTmr>0) {
    shakeTmr--;
    shakeX=(Math.random()-0.5)*shakeAmt;
    shakeY=(Math.random()-0.5)*shakeAmt;
  } else { shakeX=0; shakeY=0; }
}

// ─── LEVEL UP ──────────────────────────────────────────────────────────────
function buildLevelOpts() {
  const pool = [...STAT_UPS];
  // Add only the very next gun if available
  const nextIdx = player.gunIdx+1;
  if (nextIdx<GUNS.length) {
    const g=GUNS[nextIdx];
    pool.push({ id:'gun_'+g.id, label:g.icon+' 解鎖「'+g.name+'」', desc:gunDesc(g), type:'gun', gunIdx:nextIdx });
  }
  pool.sort(()=>Math.random()-0.5);
  levelOpts = pool.slice(0,3);
}

function gunDesc(g) {
  if (g.id==='shotgun') return '6發散射，近距離爆發傷害';
  if (g.id==='smg')     return '超高射速，快速輸出';
  if (g.id==='plasma')  return '子彈穿透最多3個殭屍';
  if (g.id==='rocket')  return '爆炸傷害，範圍殺傷';
  return '';
}

function applyUpgrade(opt) {
  if (opt.type==='gun') { player.gunIdx=opt.gunIdx; }
  else {
    switch(opt.id) {
      case 'dmg':  case 'dmg2':  player.dmgMult  *= 1.25; break;
      case 'spd':               player.spdMult  *= 1.20; break;
      case 'rate': case 'rate2': player.rateMult *= 1.25; break;
      case 'hp':    player.hp = Math.min(player.maxHp, player.hp+60); break;
      case 'maxhp': player.maxHp+=40; player.hp=Math.min(player.maxHp,player.hp+40); break;
      case 'extra': player.extraBullets++; break;
    }
  }
  gameState='playing';
}

// ─── DRAW: STITCH ──────────────────────────────────────────────────────────
function drawStitch(x,y,angle,iframes) {
  ctx.save();
  ctx.translate(x,y);
  if (iframes>0 && Math.floor(iframes/5)%2===0) ctx.globalAlpha=0.35;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0,20,18,7,0,0,Math.PI*2); ctx.fill();

  // Ears
  const earData=[[-14,-30,-0.4],[14,-30,0.4]];
  for (const [ex,ey,er] of earData) {
    ctx.fillStyle='#1a50cc';
    ctx.beginPath(); ctx.ellipse(ex,ey,9,21,er,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a68ee';
    ctx.beginPath(); ctx.ellipse(ex,ey-2,5,13,er,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(180,200,255,0.25)';
    ctx.beginPath(); ctx.ellipse(ex-2,ey-5,2,6,er-0.2,0,Math.PI*2); ctx.fill();
  }

  // Body
  ctx.fillStyle='#3388ff';
  ctx.beginPath(); ctx.ellipse(0,5,19,21,0,0,Math.PI*2); ctx.fill();

  // Belly
  ctx.fillStyle='#aaccff';
  ctx.beginPath(); ctx.ellipse(0,9,10,13,0,0,Math.PI*2); ctx.fill();

  // Back spines
  ctx.fillStyle='#1a50cc';
  for (let i=0;i<3;i++) {
    ctx.beginPath(); ctx.ellipse(-4+i*4,-21-i*2,3,7,(i-1)*0.3,0,Math.PI*2); ctx.fill();
  }

  // Head
  ctx.fillStyle='#44aaff';
  ctx.beginPath(); ctx.ellipse(0,-13,16,15,0,0,Math.PI*2); ctx.fill();

  // Eyes
  const pAx=Math.cos(angle)*2.5, pAy=Math.sin(angle)*2.5;
  for (const [ex,ey] of [[-6,-15],[6,-15]]) {
    ctx.fillStyle='white'; ctx.beginPath(); ctx.ellipse(ex,ey,6.5,7.5,-0.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a0a2a'; ctx.beginPath(); ctx.ellipse(ex+pAx,ey+pAy,3.5,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white'; ctx.beginPath(); ctx.ellipse(ex+pAx-1.5,ey+pAy-2,1.5,1.5,0,0,Math.PI*2); ctx.fill();
  }

  // Nose
  ctx.fillStyle='#0d2a88';
  ctx.beginPath(); ctx.ellipse(0,-8,5,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(180,200,255,0.3)';
  ctx.beginPath(); ctx.ellipse(-1.5,-8.5,2,1.5,0,0,Math.PI*2); ctx.fill();

  // Mouth (grin)
  ctx.strokeStyle='#0d2a88'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,-5,7,0.15,Math.PI-0.15); ctx.stroke();

  // Legs
  ctx.fillStyle='#3388ff';
  ctx.beginPath(); ctx.ellipse(-9,23,6,9,0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9,23,6,9,-0.2,0,Math.PI*2); ctx.fill();

  // Off-hand arm
  ctx.beginPath(); ctx.ellipse(-22,4,7,5,0.4,0,Math.PI*2); ctx.fill();

  // Gun arm (rotated toward aim)
  ctx.save(); ctx.rotate(angle);
  ctx.fillStyle='#3388ff';
  ctx.beginPath(); ctx.ellipse(19,0,9,5,0,0,Math.PI*2); ctx.fill();
  // Gun body
  const gun=GUNS[player.gunIdx];
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(18,-4,22,8);
  ctx.fillStyle=gun.col; ctx.fillRect(36,-3,10,6);
  // Barrel
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(38,-2,14,4);
  ctx.restore();

  ctx.restore();
}

// ─── DRAW: ZOMBIE ──────────────────────────────────────────────────────────
function drawZombie(z) {
  ctx.save(); ctx.translate(z.x, z.y);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0,z.r+2,z.r*0.8,z.r*0.3,0,0,Math.PI*2); ctx.fill();

  // Outstretched arms
  ctx.strokeStyle=z.col; ctx.lineWidth=z.r*0.32; ctx.lineCap='round';
  ctx.save(); ctx.rotate(z.moveAngle);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(z.r*1.3,0); ctx.stroke();
  ctx.restore();
  ctx.save(); ctx.rotate(z.moveAngle+Math.PI*0.18);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-z.r*1.1,0); ctx.stroke();
  ctx.restore();

  // Body
  ctx.fillStyle=z.col;
  ctx.beginPath(); ctx.ellipse(0,4,z.r*0.65,z.r*0.75,0,0,Math.PI*2); ctx.fill();

  // Head
  ctx.beginPath(); ctx.ellipse(0,-z.r*0.52,z.r*0.6,z.r*0.56,0,0,Math.PI*2); ctx.fill();

  // Torn shirt detail
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-z.r*0.3,0); ctx.lineTo(-z.r*0.1,z.r*0.4); ctx.stroke();

  // Red eyes
  ctx.fillStyle='#ff1111';
  ctx.beginPath(); ctx.ellipse(-z.r*0.2,-z.r*0.56,z.r*0.14,z.r*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(z.r*0.2,-z.r*0.56,z.r*0.14,z.r*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.ellipse(-z.r*0.24,-z.r*0.62,z.r*0.05,z.r*0.05,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(z.r*0.16,-z.r*0.62,z.r*0.05,z.r*0.05,0,0,Math.PI*2); ctx.fill();

  // HP bar
  const ratio=Math.max(0,z.hp/z.maxHp);
  ctx.fillStyle='#300'; ctx.fillRect(-z.r,-z.r*1.6,z.r*2,5);
  ctx.fillStyle=ratio>0.6?'#0e0':ratio>0.3?'#ee0':'#e00';
  ctx.fillRect(-z.r,-z.r*1.6,z.r*2*ratio,5);

  ctx.restore();
}

// ─── DRAW: BULLET ──────────────────────────────────────────────────────────
function drawBullet(b) {
  ctx.save();
  if (b.explosive) {
    ctx.translate(b.x,b.y); ctx.rotate(Math.atan2(b.vy,b.vx));
    ctx.fillStyle='#FF4500'; ctx.fillRect(-9,-4,18,8);
    ctx.fillStyle='#FFD700'; ctx.fillRect(-13,-3,6,6);
    ctx.fillStyle='#FF6600';
    ctx.beginPath(); ctx.arc(-10,0,5,0,Math.PI*2); ctx.fill();
  } else {
    ctx.shadowBlur=10; ctx.shadowColor=b.col;
    ctx.fillStyle=b.col;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    // Trail
    ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.arc(b.x-b.vx*2, b.y-b.vy*2, b.r*0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ─── DRAW: BACKGROUND ──────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle='#0d0d22';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(40,40,90,0.4)'; ctx.lineWidth=1;
  for (let x=0;x<=W;x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0;y<=H;y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

// ─── DRAW: HUD ─────────────────────────────────────────────────────────────
function drawHUD() {
  // HP
  const hpR=player.hp/player.maxHp;
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath(); ctx.roundRect(10,10,210,26,5); ctx.fill();
  ctx.fillStyle=hpR>0.5?'#00cc44':hpR>0.25?'#ffaa00':'#ff2222';
  ctx.beginPath(); ctx.roundRect(12,12,206*hpR,22,4); ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(10,10,210,26,5); ctx.stroke();
  ctx.fillStyle='white'; ctx.font='bold 13px Arial';
  ctx.fillText(`❤️ ${Math.ceil(player.hp)} / ${player.maxHp}`,18,27);

  // Kill progress
  const kR=player.kills/player.killsNeeded;
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath(); ctx.roundRect(10,42,210,22,5); ctx.fill();
  ctx.fillStyle='#aa44ff';
  ctx.beginPath(); ctx.roundRect(12,44,206*kR,18,4); ctx.fill();
  ctx.strokeStyle='#555';
  ctx.beginPath(); ctx.roundRect(10,42,210,22,5); ctx.stroke();
  ctx.fillStyle='white'; ctx.font='13px Arial';
  ctx.fillText(`💀 ${player.kills} / ${player.killsNeeded} 殭屍`,18,57);

  // Level + total
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath(); ctx.roundRect(10,70,200,24,5); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='bold 14px Arial';
  ctx.fillText(`⭐ Level ${player.level}   總擊殺: ${totalKills}`,18,87);

  // Gun info
  const gun=GUNS[player.gunIdx];
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath(); ctx.roundRect(W-185,10,175,30,5); ctx.fill();
  ctx.fillStyle=gun.col; ctx.font='bold 15px Arial';
  ctx.textAlign='right';
  ctx.fillText(`${gun.icon} ${gun.name}`,W-16,30);
  ctx.textAlign='left';

  // Controls
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='11px Arial';
  ctx.textAlign='right';
  ctx.fillText('WASD 移動 ∙ 滑鼠瞄準 ∙ 左鍵/空格 射擊',W-10,H-8);
  ctx.textAlign='left';
}

// ─── DRAW: EXPLOSIONS ──────────────────────────────────────────────────────
function drawExplosions() {
  for (const e of explosions) {
    const prog=1-e.life, r=e.maxR*(0.5+prog*0.5);
    ctx.save(); ctx.globalAlpha=e.life*0.7;
    ctx.shadowBlur=30; ctx.shadowColor='#FF4500';
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,r);
    g.addColorStop(0,'#FFFFFF'); g.addColorStop(0.2,'#FFD700');
    g.addColorStop(0.6,'#FF4500'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─── DRAW: PARTICLES ───────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─── SCREEN: START ─────────────────────────────────────────────────────────
function drawStart() {
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='rgba(255,255,255,0.6)';
  for (let i=0;i<80;i++) {
    const sx=(i*137.5)%W, sy=(i*97.3)%H;
    const sr=Math.sin(Date.now()/1000+i)*0.5+0.8;
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  }

  // Title
  ctx.textAlign='center';
  ctx.shadowBlur=20; ctx.shadowColor='#4488ff';
  ctx.fillStyle='#66aaff'; ctx.font='bold 58px Arial';
  ctx.fillText('史迪仔大戰殭屍', W/2, 120);
  ctx.fillStyle='#88bbff'; ctx.font='24px Arial';
  ctx.fillText('Stitch vs Zombies', W/2, 158);
  ctx.shadowBlur=0;

  // Draw Stitch
  drawStitch(W/2, 300, -0.5, 0);

  // Instructions
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='17px Arial';
  ctx.fillText('WASD / 方向鍵 — 移動', W/2, 410);
  ctx.fillText('滑鼠瞄準   ∙   左鍵 / 空格 — 射擊', W/2, 436);
  ctx.fillText('消滅 50 隻殭屍升一級，解鎖更強武器！', W/2, 462);

  // Weapon preview
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='13px Arial';
  ctx.fillText('🔫手槍 → 💥霰彈槍 → ⚡衝鋒槍 → 🌀電漿槍 → 🚀火箭炮', W/2, 488);

  // Start button
  const bx=W/2-110, by=510;
  ctx.fillStyle='#2244bb';
  ctx.beginPath(); ctx.roundRect(bx,by,220,52,12); ctx.fill();
  ctx.strokeStyle='#6688ff'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(bx,by,220,52,12); ctx.stroke();
  ctx.fillStyle='white'; ctx.font='bold 26px Arial';
  ctx.fillText('開始遊戲', W/2, by+36);
  ctx.textAlign='left';
}

// ─── SCREEN: LEVEL UP ──────────────────────────────────────────────────────
function drawLevelUp() {
  ctx.fillStyle='rgba(0,0,15,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';

  ctx.shadowBlur=20; ctx.shadowColor='#FFD700';
  ctx.fillStyle='#FFD700'; ctx.font='bold 46px Arial';
  ctx.fillText(`🎉 Level ${player.level} 升級！`,W/2,95);
  ctx.shadowBlur=0;
  ctx.fillStyle='#cccccc'; ctx.font='20px Arial';
  ctx.fillText('選擇一個強化：',W/2,135);

  const cW=200, cH=188, gap=28;
  const total=cW*levelOpts.length+gap*(levelOpts.length-1);
  const sx=(W-total)/2;

  for (let i=0;i<levelOpts.length;i++) {
    const opt=levelOpts[i];
    const cx=sx+i*(cW+gap), cy=158;
    const hov=mx>=cx&&mx<=cx+cW&&my>=cy&&my<=cy+cH;

    ctx.fillStyle=hov?'rgba(70,90,200,0.95)':'rgba(20,25,70,0.9)';
    ctx.strokeStyle=hov?'#aabbff':'#445599';
    ctx.lineWidth=hov?3:2;
    ctx.beginPath(); ctx.roundRect(cx,cy,cW,cH,14); ctx.fill(); ctx.stroke();

    ctx.fillStyle=opt.type==='gun'?'#88ffcc':'#FFD700';
    ctx.font='bold 17px Arial';
    ctx.fillText(opt.label, cx+cW/2, cy+55);

    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='14px Arial';
    // wrap on '，'
    const parts=opt.desc.split('，');
    parts.forEach((p,pi)=>ctx.fillText(p+(pi<parts.length-1?'，':''),cx+cW/2,cy+92+pi*22));

    if (opt.type==='gun') {
      ctx.fillStyle='#44ffaa'; ctx.font='bold 13px Arial';
      ctx.fillText('[ 新武器解鎖 ]',cx+cW/2,cy+165);
    }
  }
  ctx.textAlign='left';
}

// ─── SCREEN: GAME OVER ─────────────────────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowBlur=25; ctx.shadowColor='#ff2222';
  ctx.fillStyle='#ff3333'; ctx.font='bold 60px Arial';
  ctx.fillText('遊戲結束',W/2,180);
  ctx.shadowBlur=0;
  ctx.fillStyle='#FFD700'; ctx.font='bold 30px Arial';
  ctx.fillText(`💀 擊殺殭屍：${totalKills} 隻`,W/2,260);
  ctx.fillStyle='#aaddff'; ctx.font='bold 24px Arial';
  ctx.fillText(`⭐ 達到等級：${player.level}`,W/2,300);

  const bx=W/2-130, by=350;
  ctx.fillStyle='#882222';
  ctx.beginPath(); ctx.roundRect(bx,by,260,56,12); ctx.fill();
  ctx.strokeStyle='#ff6666'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(bx,by,260,56,12); ctx.stroke();
  ctx.fillStyle='white'; ctx.font='bold 28px Arial';
  ctx.fillText('重新開始',W/2,by+39);
  ctx.textAlign='left';
}

// ─── MAIN DRAW ─────────────────────────────────────────────────────────────
function draw() {
  ctx.save();
  ctx.translate(shakeX,shakeY);

  if (gameState==='start') { drawStart(); ctx.restore(); return; }

  drawBackground();
  drawExplosions();
  drawParticles();
  for (const b of bullets) drawBullet(b);
  for (const z of zombies) drawZombie(z);
  drawStitch(player.x, player.y, player.angle, player.iframes);
  drawHUD();

  if (gameState==='levelup')  drawLevelUp();
  if (gameState==='gameover') drawGameOver();

  // Crosshair
  if (gameState==='playing') {
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5;
    const [cx,cy]=[mx,my];
    ctx.beginPath(); ctx.moveTo(cx-10,cy); ctx.lineTo(cx-4,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+4,cy); ctx.lineTo(cx+10,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy+4); ctx.lineTo(cx,cy+10); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

// ─── GAME LOOP ─────────────────────────────────────────────────────────────
let lastTs=0;
function loop(ts) {
  const dt=Math.min((ts-lastTs)/1000, 0.1);
  lastTs=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── EVENTS ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
document.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  mx=e.clientX-r.left; my=e.clientY-r.top;
});
canvas.addEventListener('mousedown', e=>{
  if (e.button!==0) return;
  mdown=true;
  const r=canvas.getBoundingClientRect();
  mx=e.clientX-r.left; my=e.clientY-r.top;

  if (gameState==='start') {
    // Check start button
    if (mx>=W/2-110 && mx<=W/2+110 && my>=510 && my<=562) startGame();
    return;
  }
  if (gameState==='gameover') {
    if (mx>=W/2-130 && mx<=W/2+130 && my>=350 && my<=406) startGame();
    return;
  }
  if (gameState==='levelup') {
    const cW=200, cH=188, gap=28;
    const total=cW*levelOpts.length+gap*(levelOpts.length-1);
    const sx=(W-total)/2;
    for (let i=0;i<levelOpts.length;i++) {
      const cx=sx+i*(cW+gap), cy=158;
      if (mx>=cx&&mx<=cx+cW&&my>=cy&&my<=cy+cH) { applyUpgrade(levelOpts[i]); break; }
    }
  }
});
canvas.addEventListener('mouseup', e=>{ if (e.button===0) mdown=false; });
canvas.addEventListener('contextmenu', e=>e.preventDefault());

// ─── INIT ──────────────────────────────────────────────────────────────────
initPlayer();
requestAnimationFrame(loop);
</script>
</body>
